<svg viewBox="0 0 620 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram showing a land parcel where the location of an existing action is unknown">
  <style>
    text { font-family: Arial, sans-serif; font-size: 13px; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 12px; fill: #333; }
    .small { font-size: 11px; fill: #555; }
  </style>

  <!-- Parcel background -->
  <rect x="10" y="40" width="250" height="100" rx="4" fill="#d4edda" stroke="#888" stroke-width="1.5"/>
  <rect x="150" y="40" width="110" height="100" rx="0" fill="#fff3cd" stroke="#888" stroke-width="1.5"/>
  <text x="75" y="30" class="title" text-anchor="middle">Grassland (3 ha)</text>
  <text x="205" y="30" class="title" text-anchor="middle">Arable (2 ha)</text>

  <!-- Action somewhere - question mark -->
  <rect x="40" y="60" width="100" height="60" rx="4" fill="#b8daff" stroke="#004085" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="90" y="95" text-anchor="middle" font-size="22" fill="#004085">?</text>
  <text x="130" y="160" class="small" text-anchor="middle">Action A (2 ha) — where does it sit?</text>

  <!-- Arrow -->
  <text x="280" y="95" font-size="28" fill="#666">&#8594;</text>

  <!-- Possibility 1 -->
  <text x="310" y="20" class="small" font-weight="bold">Possibility 1</text>
  <rect x="310" y="28" width="300" height="60" rx="4" fill="#d4edda" stroke="#888" stroke-width="1"/>
  <rect x="490" y="28" width="120" height="60" fill="#fff3cd" stroke="#888" stroke-width="1"/>
  <rect x="310" y="28" width="120" height="60" rx="4" fill="#b8daff" stroke="#004085" stroke-width="1.5"/>
  <text x="370" y="62" text-anchor="middle" fill="#004085" font-size="11">Action A</text>
  <text x="370" y="76" text-anchor="middle" fill="#004085" font-size="11">on Grassland</text>

  <!-- Possibility 2 -->
  <text x="310" y="110" class="small" font-weight="bold">Possibility 2</text>
  <rect x="310" y="118" width="300" height="60" rx="4" fill="#d4edda" stroke="#888" stroke-width="1"/>
  <rect x="490" y="118" width="120" height="60" fill="#fff3cd" stroke="#888" stroke-width="1"/>
  <rect x="490" y="118" width="120" height="60" fill="#b8daff" stroke="#004085" stroke-width="1.5"/>
  <text x="550" y="152" text-anchor="middle" fill="#004085" font-size="11">Action A</text>
  <text x="550" y="166" text-anchor="middle" fill="#004085" font-size="11">on Arable</text>
</svg>
