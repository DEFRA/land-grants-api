x-common-migration: &common-migration
  POSTGRES_HOST: ${POSTGRES_HOST:-land-grants-backend-postgres}
  SCHEMA_ROLE: ${POSTGRES_SCHEMA_ROLE:-land_grants_api}
  SCHEMA_NAME: ${POSTGRES_SCHEMA_NAME:-public}

x-common-postgres: &common-postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-land_grants_api}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-land_grants_api}
  POSTGRES_USER: ${POSTGRES_USER:-land_grants_api}

services:

  database-up:
    image: liquibase/liquibase:4.31-alpine
    profiles: [migrations]
    restart: "no"
    environment:
      <<: [*common-postgres, *common-migration]
    entrypoint: >
      sh -c "/scripts/migration/database-up"
    depends_on:
      land-grants-backend-postgres:
        condition: service_healthy
    volumes:
      - ./changelog:/liquibase/changelog
      - ./scripts:/scripts
    networks:
      - land-grants-net

  database-down:
    image: liquibase/liquibase:4.31-alpine
    profiles: [migrations]
    restart: "no"
    environment:
      <<: [*common-postgres, *common-migration]
    entrypoint: >
      sh -c "/scripts/migration/database-down"
    depends_on:
      land-grants-backend-postgres:
        condition: service_healthy
    volumes:
      - ./changelog:/liquibase/changelog
      - ./scripts:/scripts
    networks:
      - land-grants-net

  land-grants-backend-postgres:
    image: postgis/postgis:16-3.4
    environment:
      <<: *common-postgres
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - land-grants-net

  land-grants-backend:
    build:
      context: .
      target: development
    command: ["npm", "run", "dev"]
    environment:
      <<: *common-postgres
      PORT: 3001
      POSTGRES_HOST: land-grants-backend-postgres
    volumes:
      - ./src:/home/node/src
      - node_deps:/home/node/node_modules
    ports:
      - 3001:3001
    depends_on:
      land-grants-backend-postgres:
        condition: service_healthy
    networks:
      - land-grants-net

  floci:
    image: hectorvent/floci:latest
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    tmpfs:
      - /app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s --connect-timeout 3 http://localhost:4566 > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - land-grants-net

  floci-init:
    image: amazon/aws-cli
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./scripts/infra/start-floci.sh:/setup/init.sh
    networks:
      - land-grants-net

volumes:
  node_deps:
  postgres_data:

networks:
  land-grants-net:
    name: land-grants-net
    driver: bridge
